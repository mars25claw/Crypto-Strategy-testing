version: "3.8"

services:
  funding-arb:
    build:
      context: ..
      dockerfile: strat_002_funding_arb/Dockerfile
    container_name: strat-002-funding-arb
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8082}:8082"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/strat_002_funding_arb/config.yaml:ro
      - ./.env:/app/strat_002_funding_arb/.env:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - stratlab

networks:
  stratlab:
    external: true
    name: stratlab
